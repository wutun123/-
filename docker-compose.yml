version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: pet-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_DATABASE: pet_universe
      MYSQL_USER: pet_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-pet_password}
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pet-network

  # Redis 缓存
  redis:
    image: redis:6-alpine
    container_name: pet-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - pet-network

  # Node.js 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pet-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      - mysql
      - redis
    networks:
      - pet-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: pet-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./frontend/dist:/var/www/pet-universe/frontend/dist
    depends_on:
      - backend
    networks:
      - pet-network

networks:
  pet-network:
    driver: bridge
